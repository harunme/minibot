<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniBot WebSocket 测试客户端</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3348;
    --text: #e4e6f0;
    --text-dim: #8b8fa8;
    --accent: #6c72ff;
    --accent-hover: #8186ff;
    --green: #34d399;
    --red: #f87171;
    --orange: #fbbf24;
    --blue: #60a5fa;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
      'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1 .logo { font-size: 1.8rem; }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  .container {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* --- Card --- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* --- Form row --- */
  .form-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 140px;
  }
  .form-group label {
    font-size: 0.75rem;
    color: var(--text-dim);
  }
  .form-group input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    border-color: var(--accent);
  }

  /* --- Buttons --- */
  button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-danger {
    background: var(--red);
    color: #fff;
  }
  .btn-danger:hover { opacity: 0.85; }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--border); }
  .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-mic {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    font-size: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .btn-mic:hover { border-color: var(--accent); }
  .btn-mic.recording {
    background: rgba(248, 113, 113, 0.15);
    border-color: var(--red);
    animation: pulse 1.5s infinite;
  }
  .btn-mic:disabled { opacity: 0.3; cursor: not-allowed; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(248,113,113,0); }
  }

  /* --- Controls bar --- */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .controls-side {
    display: flex;
    gap: 8px;
  }

  /* --- Status --- */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .dot.connected { background: var(--green); }
  .dot.error { background: var(--red); }

  /* --- Log --- */
  #log {
    background: var(--surface2);
    border-radius: 6px;
    padding: 12px 14px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.78rem;
    line-height: 1.65;
    max-height: 380px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-dim);
  }
  #log::-webkit-scrollbar { width: 6px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .log-info { color: var(--text); }
  .log-recv { color: var(--green); }
  .log-send { color: var(--blue); }
  .log-warn { color: var(--orange); }
  .log-error { color: var(--red); }
  .log-asr { color: #c084fc; }
  .log-reply { color: #67e8f9; font-weight: 500; }
  .log-time { color: var(--text-dim); margin-right: 6px; }

  /* --- Conversation bubble --- */
  .conversation {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 260px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .conversation::-webkit-scrollbar { width: 5px; }
  .conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.9rem;
    line-height: 1.5;
    animation: fadeIn 0.25s;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .bubble.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.bot {
    align-self: flex-start;
    background: var(--surface2);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .bubble .label {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.6);
    margin-bottom: 2px;
  }
  .bubble.bot .label { color: var(--text-dim); }
  .bubble.asr-interim {
    align-self: flex-end;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-style: italic;
    border-bottom-right-radius: 4px;
  }

  .empty-hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.82rem;
    padding: 40px 0;
  }
</style>
</head>
<body>

<h1><span class="logo">🤖</span> MiniBot WebSocket 测试客户端</h1>
<p class="subtitle">模拟 Tauri/Web 客户端 — WebSocket 语音对话测试</p>

<div class="container">

  <!-- 连接配置 -->
  <div class="card">
    <div class="card-title">连接配置</div>
    <div class="form-row">
      <div class="form-group">
        <label>WebSocket 地址</label>
        <input id="url" type="text" value="ws://localhost:9000" />
      </div>
      <div class="form-group" style="max-width:160px;">
        <label>设备 ID</label>
        <input id="deviceId" type="text" value="dev001" />
      </div>
      <div class="form-group" style="max-width:160px;">
        <label>Token（可选）</label>
        <input id="token" type="text" placeholder="留空跳过认证" />
      </div>
      <button id="btnConnect" class="btn-primary" onclick="toggleConnect()">
        连接
      </button>
    </div>
  </div>

  <!-- 对话区 -->
  <div class="card">
    <div class="card-title">对话</div>
    <div id="conversation" class="conversation">
      <div class="empty-hint">连接服务器后，按住 🎙 录音开始对话</div>
    </div>
  </div>

  <!-- 操作区 -->
  <div class="card">
    <div class="controls">
      <div class="controls-side">
        <button id="btnAbort" class="btn-ghost" onclick="sendAbort()" disabled>
          ⏹ 中止TTS
        </button>
      </div>
      <button id="btnMic" class="btn-mic" onmousedown="micDown()" onmouseup="micUp()"
              ontouchstart="micDown()" ontouchend="micUp()" disabled>
        🎙
      </button>
      <div class="controls-side">
        <button id="btnPing" class="btn-ghost" onclick="sendPing()" disabled>
          💓 心跳
        </button>
      </div>
    </div>
  </div>

  <!-- 状态 + 日志 -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <div class="card-title" style="margin-bottom:0;">日志</div>
      <div class="status-bar">
        <span id="dot" class="dot"></span>
        <span id="statusText">未连接</span>
      </div>
    </div>
    <div id="log"></div>
  </div>

</div>

<script>
// ============================================================
// State
// ============================================================
let ws = null;
let connected = false;
let recording = false;
let audioContext = null;
let mediaStream = null;
let scriptProcessor = null;
let playQueue = [];
let playing = false;

const SAMPLE_RATE = 16000;

// ============================================================
// DOM refs
// ============================================================
const $url       = document.getElementById('url');
const $deviceId  = document.getElementById('deviceId');
const $token     = document.getElementById('token');
const $btnConnect= document.getElementById('btnConnect');
const $btnMic    = document.getElementById('btnMic');
const $btnAbort  = document.getElementById('btnAbort');
const $btnPing   = document.getElementById('btnPing');
const $log       = document.getElementById('log');
const $dot       = document.getElementById('dot');
const $status    = document.getElementById('statusText');
const $convo     = document.getElementById('conversation');

// ============================================================
// Logging
// ============================================================
function ts() {
  const d = new Date();
  return d.toLocaleTimeString('zh-CN', { hour12: false }) + '.' +
    String(d.getMilliseconds()).padStart(3, '0');
}

function appendLog(text, cls = 'log-info') {
  const line = document.createElement('div');
  line.className = cls;
  line.innerHTML = `<span class="log-time">${ts()}</span>${escapeHtml(text)}`;
  $log.appendChild(line);
  $log.scrollTop = $log.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
// Conversation bubbles
// ============================================================
let interimBubble = null;

function addBubble(type, text) {
  // remove empty hint
  const hint = $convo.querySelector('.empty-hint');
  if (hint) hint.remove();

  const div = document.createElement('div');
  div.className = `bubble ${type}`;

  if (type === 'user') {
    div.innerHTML = `<div class="label">🗣 你说</div>${escapeHtml(text)}`;
  } else if (type === 'bot') {
    div.innerHTML = `<div class="label">🤖 MiniBot</div>${escapeHtml(text)}`;
  } else if (type === 'asr-interim') {
    div.innerHTML = `${escapeHtml(text)} ...`;
  }
  $convo.appendChild(div);
  $convo.scrollTop = $convo.scrollHeight;
  return div;
}

function updateInterim(text) {
  if (!interimBubble) {
    interimBubble = addBubble('asr-interim', text);
  } else {
    interimBubble.innerHTML = `${escapeHtml(text)} ...`;
  }
  $convo.scrollTop = $convo.scrollHeight;
}

function finalizeInterim(text) {
  if (interimBubble) {
    interimBubble.remove();
    interimBubble = null;
  }
  addBubble('user', text);
}

// ============================================================
// Status
// ============================================================
function setStatus(state, text) {
  $dot.className = 'dot' + (state === 'ok' ? ' connected' : state === 'err' ? ' error' : '');
  $status.textContent = text;
}

function setControlsEnabled(en) {
  $btnMic.disabled = !en;
  $btnAbort.disabled = !en;
  $btnPing.disabled = !en;
}

// ============================================================
// WebSocket
// ============================================================
function toggleConnect() {
  if (connected) {
    disconnect();
  } else {
    connect();
  }
}

function connect() {
  const url = $url.value.trim();
  if (!url) return;

  appendLog(`连接 ${url} ...`, 'log-send');
  setStatus('', '连接中...');
  $btnConnect.textContent = '连接中...';
  $btnConnect.disabled = true;

  try {
    ws = new WebSocket(url);
  } catch (e) {
    appendLog(`创建 WebSocket 失败: ${e.message}`, 'log-error');
    setStatus('err', '连接失败');
    $btnConnect.textContent = '连接';
    $btnConnect.disabled = false;
    return;
  }

  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    connected = true;
    appendLog('WebSocket 连接成功', 'log-recv');
    setStatus('ok', '已连接');
    $btnConnect.textContent = '断开';
    $btnConnect.disabled = false;
    $btnConnect.classList.remove('btn-primary');
    $btnConnect.classList.add('btn-danger');
    sendHello();
  };

  ws.onmessage = (ev) => {
    if (typeof ev.data === 'string') {
      handleTextMessage(ev.data);
    } else {
      handleBinaryMessage(ev.data);
    }
  };

  ws.onerror = (ev) => {
    appendLog('WebSocket 错误', 'log-error');
    setStatus('err', '连接错误');
  };

  ws.onclose = (ev) => {
    const reason = ev.reason || '无';
    appendLog(`连接关闭: code=${ev.code} reason=${reason}`, 'log-warn');
    resetConnection();
  };
}

function disconnect() {
  if (recording) stopRecording();
  if (ws) {
    ws.close();
  }
  resetConnection();
}

function resetConnection() {
  connected = false;
  ws = null;
  setStatus('', '未连接');
  setControlsEnabled(false);
  $btnConnect.textContent = '连接';
  $btnConnect.disabled = false;
  $btnConnect.classList.remove('btn-danger');
  $btnConnect.classList.add('btn-primary');
}

// ============================================================
// Protocol: send
// ============================================================
function sendJSON(obj) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const s = JSON.stringify(obj);
  ws.send(s);
  appendLog(`→ ${s}`, 'log-send');
}

function sendHello() {
  sendJSON({
    type: 'hello',
    device_id: $deviceId.value.trim() || 'dev001',
    token: $token.value.trim(),
    audio_params: {
      format: 'pcm',
      sample_rate: SAMPLE_RATE,
    }
  });
}

function sendPing() {
  sendJSON({ type: 'ping' });
}

function sendAbort() {
  sendJSON({ type: 'abort' });
  appendLog('已发送中止命令', 'log-warn');
}

function sendListen(mode) {
  sendJSON({ type: 'listen', mode });
}

// ============================================================
// Protocol: receive
// ============================================================
function handleTextMessage(raw) {
  let data;
  try {
    data = JSON.parse(raw);
  } catch {
    appendLog(`无效 JSON: ${raw.substring(0, 120)}`, 'log-warn');
    return;
  }

  const t = data.type || '';

  switch (t) {
    case 'hello':
      appendLog(`← 握手成功 session=${data.session_id || ''}`, 'log-recv');
      setStatus('ok', `已认证 (${$deviceId.value})`);
      setControlsEnabled(true);
      break;

    case 'stt': {
      const text = data.text || '';
      const isFinal = data.is_final;
      if (isFinal) {
        appendLog(`← ASR 【最终】: ${text}`, 'log-asr');
        finalizeInterim(text);
      } else {
        appendLog(`← ASR 【中间】: ${text}`, 'log-asr');
        updateInterim(text);
      }
      break;
    }

    case 'reply':
      appendLog(`← Agent 回复: ${data.text || ''}`, 'log-reply');
      addBubble('bot', data.text || '');
      break;

    case 'tts':
      if (data.state === 'start') {
        appendLog('← TTS 开始 🔊', 'log-recv');
        playQueue = [];
        playing = false;
      } else if (data.state === 'end') {
        appendLog('← TTS 结束', 'log-recv');
      }
      break;

    case 'pong':
      appendLog('← pong', 'log-recv');
      break;

    case 'error':
      appendLog(`← 错误: ${data.code || ''} — ${data.message || ''}`, 'log-error');
      break;

    default:
      appendLog(`← 未知: ${JSON.stringify(data)}`, 'log-warn');
  }
}

function handleBinaryMessage(buffer) {
  const bytes = new Uint8Array(buffer);
  appendLog(`← 收到音频 ${bytes.length} bytes`, 'log-recv');
  playQueue.push(buffer);
  if (!playing) playNextChunk();
}

// ============================================================
// Audio Playback (TTS)
// ============================================================
async function ensureAudioContext() {
  if (!audioContext || audioContext.state === 'closed') {
    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
  }
  if (audioContext.state === 'suspended') {
    await audioContext.resume();
  }
}

async function playNextChunk() {
  if (playQueue.length === 0) {
    playing = false;
    return;
  }
  playing = true;
  await ensureAudioContext();

  const buffer = playQueue.shift();
  try {
    // 尝试将二进制数据解释为 PCM 16-bit 有符号整数
    const int16 = new Int16Array(buffer);
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) {
      float32[i] = int16[i] / 32768;
    }
    const audioBuf = audioContext.createBuffer(1, float32.length, 24000);
    audioBuf.getChannelData(0).set(float32);

    const source = audioContext.createBufferSource();
    source.buffer = audioBuf;
    source.connect(audioContext.destination);
    source.onended = () => playNextChunk();
    source.start();
  } catch (e) {
    appendLog(`播放失败: ${e.message}`, 'log-error');
    playNextChunk();
  }
}

// ============================================================
// Microphone Recording
// ============================================================
async function startRecording() {
  if (recording) return;

  try {
    await ensureAudioContext();

    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate: SAMPLE_RATE,
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
      }
    });

    // 创建录音上下文 (16kHz)
    const recCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
    const source = recCtx.createMediaStreamSource(mediaStream);

    // ScriptProcessorNode (deprecated but widely supported)
    // bufferSize = 4096 → ~256ms @ 16kHz
    const processor = recCtx.createScriptProcessor(4096, 1, 1);
    processor.onaudioprocess = (e) => {
      if (!recording || !ws || ws.readyState !== WebSocket.OPEN) return;
      const float32 = e.inputBuffer.getChannelData(0);
      // 转为 PCM 16-bit
      const int16 = new Int16Array(float32.length);
      for (let i = 0; i < float32.length; i++) {
        let s = Math.max(-1, Math.min(1, float32[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      ws.send(int16.buffer);
    };

    source.connect(processor);
    processor.connect(recCtx.destination);

    scriptProcessor = { processor, source, context: recCtx };
    recording = true;

    sendListen('start');

    $btnMic.classList.add('recording');
    appendLog('🎙 开始录音...', 'log-info');

  } catch (e) {
    appendLog(`麦克风获取失败: ${e.message}`, 'log-error');
  }
}

function stopRecording() {
  if (!recording) return;
  recording = false;

  sendListen('stop');

  if (scriptProcessor) {
    try {
      scriptProcessor.processor.disconnect();
      scriptProcessor.source.disconnect();
      scriptProcessor.context.close();
    } catch {}
    scriptProcessor = null;
  }
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }

  $btnMic.classList.remove('recording');
  appendLog('🎙 停止录音', 'log-info');
}

function micDown() {
  if (!connected) return;
  startRecording();
}

function micUp() {
  stopRecording();
}

// Prevent context menu on long-press (mobile)
document.getElementById('btnMic').addEventListener('contextmenu', e => e.preventDefault());

// ============================================================
// Keyboard shortcut: Space = push-to-talk
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.repeat && connected && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    micDown();
  }
});
document.addEventListener('keyup', (e) => {
  if (e.code === 'Space' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    micUp();
  }
});
</script>
</body>
</html>
