<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniBot WebSocket 测试客户端</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232736;
    --border: #2e3348;
    --text: #e4e6f0;
    --text-dim: #8b8fa8;
    --accent: #6c72ff;
    --accent-hover: #8186ff;
    --green: #34d399;
    --red: #f87171;
    --orange: #fbbf24;
    --blue: #60a5fa;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
      'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1 .logo { font-size: 1.8rem; }

  .subtitle {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }

  .container {
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* --- Card --- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 14px;
  }

  /* --- Mic control area (integrated) --- */
  .mic-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .mic-area .state-pill {
    font-size: 0.82rem;
    min-width: 200px;
  }
  #levelMeter {
    width: 72px;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }
  #levelBar {
    height: 100%;
    width: 0%;
    background: var(--green);
    border-radius: 4px;
    transition: width 0.05s;
  }
  #levelBar.active { background: var(--red); }

  /* --- Chunk counter --- */
  #chunkCount {
    font-size: 0.7rem;
    color: var(--text-dim);
    text-align: center;
    min-height: 1em;
  }

  /* --- Form row (config section) --- */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 140px;
  }
  .form-group label {
    font-size: 0.75rem;
    color: var(--text-dim);
  }
  .form-group input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    border-color: var(--accent);
  }

  /* --- Buttons --- */
  button {
    cursor: pointer;
    border: none;
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-danger {
    background: var(--red);
    color: #fff;
  }
  .btn-danger:hover { opacity: 0.85; }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--border); }
  .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-mic {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--border);
    font-size: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
  }
  .btn-mic:hover { border-color: var(--accent); }
  .btn-mic.listening {
    background: rgba(248, 113, 113, 0.15);
    border-color: var(--red);
    animation: pulse 1.5s infinite;
  }
  .btn-mic.speaking {
    background: rgba(251, 191, 36, 0.12);
    border-color: var(--orange);
    animation: pulse-orange 1.5s infinite;
  }
  .btn-mic:disabled { opacity: 0.3; cursor: not-allowed; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(248,113,113,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(248,113,113,0); }
  }
  @keyframes pulse-orange {
    0%, 100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(251,191,36,0); }
  }

  /* --- Audio level meter --- */

  /* --- State pill --- */
  .state-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    border: 1px solid transparent;
    transition: all 0.25s;
    cursor: default;
    min-width: 160px;
    justify-content: center;
  }
  .state-pill.idle {
    color: var(--text-dim);
    border-color: var(--border);
    background: var(--surface2);
  }
  .state-pill.listening {
    color: var(--red);
    border-color: rgba(248,113,113,0.4);
    background: rgba(248,113,113,0.08);
  }
  .state-pill.processing {
    color: var(--blue);
    border-color: rgba(96,165,250,0.4);
    background: rgba(96,165,250,0.08);
  }
  .state-pill.processing .dot-anim {
    background: var(--blue);
    animation: blink 0.8s infinite;
  }
  .state-pill.speaking {
    color: var(--orange);
    border-color: rgba(251,191,36,0.4);
    background: rgba(251,191,36,0.08);
  }
  .state-pill .dot-anim {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .state-pill.idle .dot-anim { background: var(--text-dim); }
  .state-pill.listening .dot-anim { background: var(--red); animation: blink 1s infinite; }
  .state-pill.speaking .dot-anim { background: var(--orange); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* --- Controls bar --- */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .controls-side {
    display: flex;
    gap: 8px;
  }

  /* --- Status --- */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .dot.connected { background: var(--green); }
  .dot.error { background: var(--red); }

  /* --- Log --- */
  #log {
    background: var(--surface2);
    border-radius: 6px;
    padding: 12px 14px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 0.78rem;
    line-height: 1.65;
    max-height: 380px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text-dim);
  }
  #log::-webkit-scrollbar { width: 6px; }
  #log::-webkit-scrollbar-track { background: transparent; }
  #log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .log-info { color: var(--text); }
  .log-recv { color: var(--green); }
  .log-send { color: var(--blue); }
  .log-warn { color: var(--orange); }
  .log-error { color: var(--red); }
  .log-asr { color: #c084fc; }
  .log-reply { color: #67e8f9; font-weight: 500; }
  .log-time { color: var(--text-dim); margin-right: 6px; }

  /* --- Conversation bubble --- */
  .conversation {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 260px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .conversation::-webkit-scrollbar { width: 5px; }
  .conversation::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .bubble {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.9rem;
    line-height: 1.5;
    animation: fadeIn 0.25s;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .bubble.user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.bot {
    align-self: flex-start;
    background: var(--surface2);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .bubble .label {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.6);
    margin-bottom: 2px;
  }
  .bubble.bot .label { color: var(--text-dim); }
  .bubble.asr-interim {
    align-self: flex-end;
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-style: italic;
    border-bottom-right-radius: 4px;
  }

  .empty-hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.82rem;
    padding: 40px 0;
  }
</style>
</head>
<body>

<h1><span class="logo">🤖</span> MiniBot WebSocket 测试客户端</h1>
<p class="subtitle">模拟 Tauri/Web 客户端 — WebSocket 语音对话测试</p>

<div class="container">

  <!-- 对话区 -->
  <div class="card">
    <div class="card-title">对话</div>
    <div id="conversation" class="conversation">
      <div class="empty-hint">点击 🎙 连接服务器并开始说话</div>
    </div>
  </div>

  <!-- 操作区 -->
  <div class="card">
    <div class="mic-area">
      <div id="levelMeter"><div id="levelBar"></div></div>
      <button id="btnMic" class="btn-mic">
        🎙
      </button>
      <div id="chunkCount"></div>
      <div id="statePill" class="state-pill idle">
        <span class="dot-anim"></span>
        <span id="stateText">点击连接</span>
      </div>
    </div>
  </div>

  <!-- 状态 + 日志 -->
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <div class="card-title" style="margin-bottom:0;">日志</div>
      <div class="status-bar">
        <span id="dot" class="dot"></span>
        <span id="statusText">未连接</span>
        <span id="wsInfo" style="font-size:0.72rem; color:var(--text-dim); margin-left:6px;"></span>
      </div>
    </div>
    <div id="log"></div>
  </div>

  <!-- 连接配置（折叠在日志卡片底部） -->
  <details class="card" style="padding:14px 20px;">
    <summary style="cursor:pointer; font-size:0.78rem; color:var(--text-dim); user-select:none;">
      ⚙ 连接配置
    </summary>
    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-top:10px;">
      <div class="form-group">
        <label>WebSocket 地址</label>
        <input id="url" type="text" value="ws://localhost:9000" />
      </div>
      <div class="form-group" style="max-width:160px;">
        <label>设备 ID</label>
        <input id="deviceId" type="text" value="dev001" />
      </div>
      <div class="form-group" style="max-width:160px;">
        <label>Token（可选）</label>
        <input id="token" type="text" placeholder="留空跳过认证" />
      </div>
    </div>
  </details>

</div>

<script>
// ============================================================
// State machine: IDLE → LISTENING → SPEAKING → IDLE
// IDLE also covers "connecting" sub-state
// ============================================================
const AppState = { IDLE: 'idle', LISTENING: 'listening', PROCESSING: 'processing', SPEAKING: 'speaking' };
let appState = AppState.IDLE;
let connecting = false;          // 正在建立连接中
let ws = null;
let connected = false;
let recording = false;
let audioContext = null;
let mediaStream = null;
let scriptProcessor = null;
let playQueue = [];
let playing = false;
let chunkSentCount = 0;
let lastChunkTime = 0;
let heartbeatTimer = null;

// 录音采样率（与 ASR 期望一致）
const REC_SAMPLE_RATE = 16000;
// TTS 播放采样率（由服务端 hello 响应中的 audio_params.sample_rate 指定）
let serverSampleRate = 24000;
// VAD 模式标志（由服务端 hello 响应指定，影响超时和行为）
let vadMode = false;


// ============================================================
// DOM refs
// ============================================================
const $url       = document.getElementById('url');
const $deviceId  = document.getElementById('deviceId');
const $token     = document.getElementById('token');
const $btnMic    = document.getElementById('btnMic');
const $log       = document.getElementById('log');
const $dot       = document.getElementById('dot');
const $status    = document.getElementById('statusText');
const $wsInfo    = document.getElementById('wsInfo');
const $convo     = document.getElementById('conversation');
const $levelBar  = document.getElementById('levelBar');
const $chunkCount= document.getElementById('chunkCount');
const $statePill = document.getElementById('statePill');
const $stateText = document.getElementById('stateText');

// ============================================================
// Logging
// ============================================================
function ts() {
  const d = new Date();
  return d.toLocaleTimeString('zh-CN', { hour12: false }) + '.' +
    String(d.getMilliseconds()).padStart(3, '0');
}

function appendLog(text, cls = 'log-info') {
  const line = document.createElement('div');
  line.className = cls;
  line.innerHTML = `<span class="log-time">${ts()}</span>${escapeHtml(text)}`;
  $log.appendChild(line);
  $log.scrollTop = $log.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
// Conversation bubbles
// ============================================================
let interimBubble = null;

function addBubble(type, text) {
  // remove empty hint
  const hint = $convo.querySelector('.empty-hint');
  if (hint) hint.remove();

  const div = document.createElement('div');
  div.className = `bubble ${type}`;

  if (type === 'user') {
    div.innerHTML = `<div class="label">🗣 你说</div>${escapeHtml(text)}`;
  } else if (type === 'bot') {
    div.innerHTML = `<div class="label">🤖 MiniBot</div>${escapeHtml(text)}`;
  } else if (type === 'asr-interim') {
    div.innerHTML = `${escapeHtml(text)} ...`;
  }
  $convo.appendChild(div);
  $convo.scrollTop = $convo.scrollHeight;
  return div;
}

function updateInterim(text) {
  if (!interimBubble) {
    interimBubble = addBubble('asr-interim', text);
  } else {
    interimBubble.innerHTML = `${escapeHtml(text)} ...`;
  }
  $convo.scrollTop = $convo.scrollHeight;
}

function finalizeInterim(text) {
  if (interimBubble) {
    interimBubble.remove();
    interimBubble = null;
  }
  addBubble('user', text);
}

// ============================================================
// Status
// ============================================================
function setStatus(state, text) {
  $dot.className = 'dot' + (state === 'ok' ? ' connected' : state === 'err' ? ' error' : '');
  $status.textContent = text;
}

function setWsInfo(text) {
  $wsInfo.textContent = text;
}

// ============================================================
// App State machine
// ============================================================
const STATE_LABELS = {
  idle: '点击麦克风开始说话',
  listening: '正在听...',
  processing: '处理中...',
  speaking: '说话中，点击打断',
};

function setAppState(newState) {
  appState = newState;
  $statePill.className = 'state-pill ' + newState;
  $stateText.textContent = STATE_LABELS[newState] || newState;

  // Mic button style
  $btnMic.classList.remove('listening', 'speaking');
  if (newState === AppState.LISTENING) $btnMic.classList.add('listening');
  if (newState === AppState.SPEAKING)   $btnMic.classList.add('speaking');
}

// Mic button click — integrates connect + interrupt
function onMicClick() {
  if (!connected && !connecting) {
    // 未连接 → 自动连接
    connect();
    return;
  }
  if (!connected) return;

  switch (appState) {
    case AppState.IDLE:
      startListening();
      break;
    case AppState.LISTENING:
      stopListening();
      break;
    case AppState.SPEAKING:
      onAbortClick();
      break;
  }
}

// 打断 TTS
function onAbortClick() {
  if (appState !== AppState.SPEAKING) return;
  sendAbort();
  stopPlayback();
  clearInterim();
  setAppState(AppState.IDLE);
  appendLog('已打断 TTS', 'log-warn');
}

function clearInterim() {
  if (interimBubble) {
    interimBubble.remove();
    interimBubble = null;
  }
}

// PROCESSING 状态超时兜底（ASR 无结果时返回 IDLE）
// VAD 模式下服务端等待静默检测后才送 ASR，需要更长超时
const PROCESSING_TIMEOUT_NORMAL = 8000;  // 非 VAD 模式：8s
const PROCESSING_TIMEOUT_VAD = 20000;    // VAD 模式：20s（等 VAD 静默检测 + ASR 响应）
let processingTimer = null;

function getProcessingTimeout() {
  return vadMode ? PROCESSING_TIMEOUT_VAD : PROCESSING_TIMEOUT_NORMAL;
}

function clearProcessingTimer() {
  if (processingTimer !== null) {
    clearTimeout(processingTimer);
    processingTimer = null;
  }
}

function startProcessingTimer() {
  clearProcessingTimer();
  const timeout = getProcessingTimeout();
  processingTimer = setTimeout(() => {
    if (appState === AppState.PROCESSING) {
      appendLog(`⚠ ASR 无响应（${timeout/1000}s 超时），返回就绪`, 'log-warn');
      clearInterim();
      setAppState(AppState.IDLE);
    }
  }, timeout);
}

function stopPlayback() {
  playQueue = [];
  playing = false;
}

// ============================================================
// WebSocket
// ============================================================
function connect() {
  if (connected || connecting) return;
  const url = $url.value.trim();
  if (!url) return;

  connecting = true;
  appendLog(`连接 ${url} ...`, 'log-send');
  setStatus('', '连接中...');
  $stateText.textContent = '连接中...';
  $btnMic.disabled = true;

  try {
    ws = new WebSocket(url);
  } catch (e) {
    appendLog(`创建 WebSocket 失败: ${e.message}`, 'log-error');
    setStatus('err', '连接失败');
    connecting = false;
    $btnMic.disabled = false;
    $stateText.textContent = '点击连接';
    return;
  }

  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    connected = true;
    connecting = false;
    appendLog('WebSocket 连接成功', 'log-recv');
    setStatus('ok', '已连接');
    $btnMic.disabled = false;
    sendHello();
    startHeartbeat();
    // 连接成功后自动开始录音
    startListening();
  };

  ws.onmessage = (ev) => {
    if (typeof ev.data === 'string') {
      handleTextMessage(ev.data);
    } else {
      handleBinaryMessage(ev.data);
    }
  };

  ws.onerror = (ev) => {
    appendLog('WebSocket 错误', 'log-error');
    setStatus('err', '连接错误');
  };

  ws.onclose = (ev) => {
    const reason = ev.reason || '无';
    appendLog(`连接关闭: code=${ev.code} reason=${reason}`, 'log-warn');
    resetConnection();
  };
}

function disconnect() {
  if (recording) stopListening();
  stopHeartbeat();
  if (ws) {
    ws.close();
  }
  resetConnection();
}

function resetConnection() {
  connected = false;
  connecting = false;
  ws = null;
  if (recording) stopListening();
  stopPlayback();
  stopHeartbeat();
  clearProcessingTimer();
  clearInterim();
  setAppState(AppState.IDLE);
  $btnMic.disabled = false;
  $stateText.textContent = '点击连接';
  $status.textContent = '未连接';
  $dot.className = 'dot';
  $wsInfo.textContent = '';
}

// ============================================================
// Heartbeat
// ============================================================
const HEARTBEAT_INTERVAL = 25000; // 25s 自动心跳

function startHeartbeat() {
  stopHeartbeat();
  heartbeatTimer = setInterval(() => {
    if (connected) sendPing();
  }, HEARTBEAT_INTERVAL);
}

function stopHeartbeat() {
  if (heartbeatTimer !== null) {
    clearInterval(heartbeatTimer);
    heartbeatTimer = null;
  }
}

// ============================================================
// Protocol: send
// ============================================================
function sendJSON(obj) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const s = JSON.stringify(obj);
  ws.send(s);
  appendLog(`→ ${s}`, 'log-send');
}

function sendHello() {
  sendJSON({
    type: 'hello',
    device_id: $deviceId.value.trim() || 'dev001',
    token: $token.value.trim(),
    audio_params: {
      format: 'pcm',
      sample_rate: REC_SAMPLE_RATE,  // 告知服务端客户端发送的音频参数（用于 ASR）
    }
  });
}

function sendPing() {
  sendJSON({ type: 'ping' });
}

function sendAbort() {
  sendJSON({ type: 'abort' });
  appendLog('已发送中止命令', 'log-warn');
}

function sendListen(mode) {
  sendJSON({ type: 'listen', mode });
}

// ============================================================
// Protocol: receive
// ============================================================
function handleTextMessage(raw) {
  let data;
  try {
    data = JSON.parse(raw);
  } catch {
    appendLog(`无效 JSON: ${raw.substring(0, 120)}`, 'log-warn');
    return;
  }

  const t = data.type || '';

  switch (t) {
    case 'hello':
      appendLog(`← 握手成功 session=${data.session_id || ''}`, 'log-recv');
      // 更新 TTS 播放采样率（由服务端指定）
      if (data.audio_params && data.audio_params.sample_rate) {
        serverSampleRate = data.audio_params.sample_rate;
        appendLog(`   音频参数: ${data.audio_params.format} ${serverSampleRate}Hz`, 'log-recv');
      }
      // 记录 VAD 模式（服务端告知是否启用 VAD）
      if (data.vad !== undefined) {
        vadMode = data.vad;
        appendLog(`   VAD 模式: ${vadMode ? '启用' : '关闭'}`, 'log-recv');
      }
      setStatus('ok', `已认证 (${$deviceId.value})`);
      setWsInfo($url.value.trim());
      setAppState(AppState.IDLE);
      break;

    case 'stt': {
      const text = data.text || '';
      const isFinal = data.is_final;
      if (isFinal) {
        appendLog(`← ASR 【最终】: ${text}`, 'log-asr');
        finalizeInterim(text);
        // ASR 结果已到达，清除超时定时器；等待 TTS start 进入 SPEAKING，
        // 若无 TTS 回复则回到 IDLE（用户可随时点击麦克风开启新一轮）
        clearProcessingTimer();
        // 只有不在 SPEAKING 时才回 IDLE，避免打断播放中 TTS
        if (appState !== AppState.SPEAKING) {
          setAppState(AppState.IDLE);
        }
      } else {
        appendLog(`← ASR 【中间】: ${text}`, 'log-asr');
        updateInterim(text);
      }
      break;
    }

    case 'reply':
      appendLog(`← Agent 回复: ${data.text || ''}`, 'log-reply');
      addBubble('bot', data.text || '');
      break;

    case 'tts':
      if (data.state === 'start') {
        appendLog('← TTS 开始 🔊', 'log-recv');
        clearProcessingTimer();
        clearInterim();
        playQueue = [];
        playing = false;
        // 如果还在录音，先停止
        if (appState === AppState.LISTENING) {
          stopListening();
        }
        setAppState(AppState.SPEAKING);
      } else if (data.state === 'stop') {
        // 服务端通知打断（VAD 检测到用户说话 或 客户端 abort 命令）
        appendLog('← TTS 被打断', 'log-warn');
        stopPlayback();
        clearInterim();
        if (appState === AppState.SPEAKING) {
          setAppState(AppState.IDLE);
        }
      } else if (data.state === 'end') {
        appendLog('← TTS 结束', 'log-recv');
        if (appState === AppState.SPEAKING) {
          setAppState(AppState.IDLE);
        }
      }
      break;

    case 'pong':
      appendLog('← pong', 'log-recv');
      break;

    case 'error':
      appendLog(`← 错误: ${data.code || ''} — ${data.message || ''}`, 'log-error');
      clearProcessingTimer();
      clearInterim();
      if (appState !== AppState.IDLE) setAppState(AppState.IDLE);
      break;

    default:
      appendLog(`← 未知: ${JSON.stringify(data)}`, 'log-warn');
  }
}

function handleBinaryMessage(buffer) {
  const bytes = new Uint8Array(buffer);
  // 音频格式检测：opus 固定头 "OggS"，PCM 无固定头
  const isOpus = bytes.length >= 4 && bytes[0] === 0x4F && bytes[1] === 0x67 && bytes[2] === 0x67 && bytes[3] === 0x53;
  const hint = isOpus ? ' [OPUS!]' : (bytes.length >= 4 ? ` [PCM? hex=${bytes[0].toString(16).padStart(2,'0')}]` : '');
  appendLog(`← 音频 ${bytes.length} bytes${hint}`, 'log-recv');
  playQueue.push(buffer);
  if (!playing) playNextChunk();
}

// ============================================================
// Audio Playback (TTS)
// ============================================================
  // TTS 播放：sample_rate 由服务端 hello 响应指定
async function ensureAudioContext() {
  if (!audioContext || audioContext.state === 'closed') {
    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: serverSampleRate });
  }
  if (audioContext.state === 'suspended') {
    await audioContext.resume();
  }
}

async function playNextChunk() {
  if (playQueue.length === 0) {
    playing = false;
    return;
  }
  playing = true;
  await ensureAudioContext();

  const buffer = playQueue.shift();
  try {
    // TTS 输出 PCM 24kHz 16bit，浏览器无法原生解码，需手动转 Float32
    const int16 = new Int16Array(buffer);
    const float32 = new Float32Array(int16.length);
    for (let i = 0; i < int16.length; i++) {
      float32[i] = int16[i] / 32768;
    }
    const audioBuf = audioContext.createBuffer(1, float32.length, serverSampleRate);
    audioBuf.getChannelData(0).set(float32);

    const source = audioContext.createBufferSource();
    source.buffer = audioBuf;
    source.connect(audioContext.destination);
    source.onended = () => playNextChunk();
    source.start();
  } catch (e) {
    appendLog(`播放失败: ${e.message}`, 'log-error');
    playNextChunk();
  }
}

// ============================================================
// Microphone Recording
// ============================================================
// 点击麦克风开始录音
async function startListening() {
  if (recording) return;
  try {
    await ensureAudioContext();

    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        sampleRate: REC_SAMPLE_RATE,
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
      }
    });

    // 创建录音上下文 (16kHz)
    const recCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: REC_SAMPLE_RATE });
    const source = recCtx.createMediaStreamSource(mediaStream);

    // AudioWorkletNode（现代 API，替代已废弃的 ScriptProcessorNode）
    // 将 PCM 采集 + 16bit 转换下沉到 worklet 线程
    const workletCode = `
      class PcmCapture extends AudioWorkletProcessor {
        process(inputs, outputs) {
          const input = inputs[0];
          if (!input || !input[0]) return true;
          const float32 = input[0];
          const int16 = new Int16Array(float32.length);
          let sum = 0;
          for (let i = 0; i < float32.length; i++) {
            const s = Math.max(-1, Math.min(1, float32[i]));
            int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            sum += int16[i] * int16[i];
          }
          const rms = Math.sqrt(sum / int16.length);
          // 转移 ArrayBuffer，发送后 worklet 侧原 buffer 变空（无害）
          this.port.postMessage({ pcm: int16.buffer, rms }, [int16.buffer]);
          return true;
        }
      }
      registerProcessor('pcm-capture', PcmCapture);
    `;
    const blob = new Blob([workletCode], { type: 'application/javascript' });
    const workletUrl = URL.createObjectURL(blob);
    await recCtx.audioWorklet.addModule(workletUrl);
    URL.revokeObjectURL(workletUrl);

    const processorNode = new AudioWorkletNode(recCtx, 'pcm-capture');
    processorNode.port.onmessage = (ev) => {
      if (recording && ws && ws.readyState === WebSocket.OPEN) {
        const { pcm, rms } = ev.data;

        // 音量条
        const pct = Math.min(100, (rms / 32768) * 300);
        $levelBar.style.width = pct + '%';
        $levelBar.classList.toggle('active', rms > 300);

        // 发往服务端
        ws.send(pcm);

        chunkSentCount++;
        const now = Date.now();
        if (chunkSentCount === 1 || now - lastChunkTime > 1000) {
          $chunkCount.textContent = chunkSentCount + ' ch | rms=' + Math.round(rms);
          lastChunkTime = now;
        }
      }
    };

    source.connect(processorNode);
    // 数据通过 port.postMessage 发送到主线程，destination 连接仅满足 AudioWorklet 调度需要
    processorNode.connect(recCtx.destination);

    scriptProcessor = { processorNode, source, context: recCtx };
    recording = true;
    chunkSentCount = 0;
    lastChunkTime = 0;
    $levelBar.style.width = '0%';
    $chunkCount.textContent = '';

    setAppState(AppState.LISTENING);
    sendListen('start');
    appendLog('🎙 开始录音', 'log-info');

  } catch (e) {
    appendLog(`麦克风获取失败: ${e.message}`, 'log-error');
    setAppState(AppState.IDLE);
  }
}

// 点击麦克风再次点击或由 TTS 开始时停止录音
function stopListening() {
  if (!recording) return;
  recording = false;

  if (scriptProcessor) {
    try {
      scriptProcessor.processorNode.disconnect();
      scriptProcessor.source.disconnect();
      scriptProcessor.context.close();
    } catch {}
    scriptProcessor = null;
  }
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }

  $levelBar.style.width = '0%';
  sendListen('stop');
  // 发送结束帧后清除临时气泡，避免残留"正在听"状态
  clearInterim();
  appendLog('🎙 停止录音 (共发送 ' + chunkSentCount + ' 块)', 'log-info');
  // 进入 PROCESSING，等待 ASR 最终结果或 TTS 开始；加超时兜底
  setAppState(AppState.PROCESSING);
  startProcessingTimer();
}

// Prevent context menu on long-press (mobile)
document.getElementById('btnMic').addEventListener('contextmenu', e => e.preventDefault());
// Mic button click — state-aware
document.getElementById('btnMic').addEventListener('click', onMicClick);
