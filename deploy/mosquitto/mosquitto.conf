# MiniBot — Mosquitto MQTT Broker 配置（开发环境）
# 文档参考：docs/design/v1/mqtt-channel.md §3.2

# === 基础配置 ===
listener 1883
protocol mqtt
allow_anonymous false
password_file /mosquitto/config/pwfile

# === WebSocket 监听（调试/Web 客户端使用）===
listener 9001
protocol websockets

# === 持久化 ===
persistence true
persistence_location /mosquitto/data/

# === 日志 ===
log_dest file /mosquitto/log/mosquitto.log
log_type all

# === TLS（生产环境取消注释）===
# listener 8883
# cafile /mosquitto/certs/ca.crt
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key

# === 连接限制 ===
max_connections -1
max_packet_size 262144

# === 说明 ===
# 开发环境使用 password_file 认证，通过 mosquitto_passwd 管理账号：
#   mosquitto_passwd -c /mosquitto/config/pwfile minibot
# 生产环境切换到 EMQX 并启用 JWT 认证插件。
